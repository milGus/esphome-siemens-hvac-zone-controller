      - lambda: 'std::vector<uint8_t> frame = {0x02, 0x00, 0x22, 0x00, 0x1F, 0x01, 0x00, 0x01, 0x0C, 0x51, 0x05, 0x03}; id(${uart_id}).write_array(frame.data(), frame.size());'
    close_action:
      - lambda: 'std::vector<uint8_t> frame = {0x02, 0x00, 0x22, 0x00, 0x1F, 0x01, 0x00, 0x01, 0x0C, 0x51, 0x05, 0x03}; id(${uart_id}).write_array(frame.data(), frame.size());'

# Set up the debugger listener logic dynamically based on whatever UART bus is passed in
uart:
  - id: ${uart_id}
    debug:
      direction: BOTH
      dummy_receiver: true
      after:
        timeout: 30ms
      sequence:
        - lambda: |-
            UARTDebug::log_hex(direction, bytes, ' ');
            
            if (direction == UART_DIRECTION_RX) {
              static std::vector<uint8_t> rx_buffer;
              rx_buffer.insert(rx_buffer.end(), bytes.begin(), bytes.end());
              
              while (rx_buffer.size() >= 13) {
                if (rx_buffer[0] == 0x02 && rx_buffer[1] == 0x00 && rx_buffer[2] == 0x12) {
                  if (rx_buffer[12] == 0x03) {
                    uint8_t master_zone_mask = rx_buffer[11];
                    
                    if (master_zone_mask != id(current_zone_mask)) {
                      id(current_zone_mask) = master_zone_mask;
                      
                      id(zone_1).publish_state((master_zone_mask & 0x01) ? true : false);
                      id(zone_2).publish_state((master_zone_mask & 0x02) ? true : false);
                      id(zone_3).publish_state((master_zone_mask & 0x04) ? true : false);
                      id(zone_4).publish_state((master_zone_mask & 0x08) ? true : false);
                      id(zone_5).publish_state((master_zone_mask & 0x10) ? true : false);
                      id(zone_6).publish_state((master_zone_mask & 0x20) ? true : false);
                    }
                  }
                  rx_buffer.erase(rx_buffer.begin(), rx_buffer.begin() + 13);
                } 
                else {
                  rx_buffer.erase(rx_buffer.begin());
                }
              }
            }
