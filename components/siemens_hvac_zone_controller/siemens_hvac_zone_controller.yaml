# Define a fallback default value in case someone doesn't specify an ID
substitutions:
  uart_id: siemens_bus_uart

globals:
  - id: current_zone_mask
    type: uint8_t
    restore_value: yes
    initial_value: "0x08"

valve:
  - platform: template
    name: "Zone 1"
    id: zone_1
    assumed_state: false
    lambda: 'return (id(current_zone_mask) & 0x01) ? true : false;'
    open_action:
      - lambda: 'std::vector<uint8_t> frame = {0x02, 0x00, 0x22, 0x00, 0x1F, 0x01, 0x00, 0x01, 0x0C, 0x51, 0x00, 0x03}; id(${uart_id}).write_array(frame.data(), frame.size());'
    close_action:
      - lambda: 'std::vector<uint8_t> frame = {0x02, 0x00, 0x22, 0x00, 0x1F, 0x01, 0x00, 0x01, 0x0C, 0x51, 0x00, 0x03}; id(${uart_id}).write_array(frame.data(), frame.size());'

  - platform: template
    name: "Zone 2"
    id: zone_2
    assumed_state: false
    lambda: 'return (id(current_zone_mask) & 0x02) ? true : false;'
    open_action:
      - lambda: 'std::vector<uint8_t> frame = {0x02, 0x00, 0x22, 0x00, 0x1F, 0x01, 0x00, 0x01, 0x0C, 0x51, 0x01, 0x03}; id(${uart_id}).write_array(frame.data(), frame.size());'
    close_action:
      - lambda: 'std::vector<uint8_t> frame = {0x02, 0x00, 0x22, 0x00, 0x1F, 0x01, 0x00, 0x01, 0x0C, 0x51, 0x01, 0x03}; id(${uart_id}).write_array(frame.data(), frame.size());'

  - platform: template
    name: "Zone 3"
    id: zone_3
    assumed_state: false
    lambda: 'return (id(current_zone_mask) & 0x04) ? true : false;'
    open_action:
      - lambda: 'std::vector<uint8_t> frame = {0x02, 0x00, 0x22, 0x00, 0x1F, 0x01, 0x00, 0x01, 0x0C, 0x51, 0x02, 0x03}; id(${uart_id}).write_array(frame.data(), frame.size());'
    close_action:
      - lambda: 'std::vector<uint8_t> frame = {0x02, 0x00, 0x22, 0x00, 0x1F, 0x01, 0x00, 0x01, 0x0C, 0x51, 0x02, 0x03}; id(${uart_id}).write_array(frame.data(), frame.size());'

  - platform: template
    name: "Zone 4"
    id: zone_4
    assumed_state: false
    lambda: 'return (id(current_zone_mask) & 0x08) ? true : false;'
    open_action:
      - lambda: 'std::vector<uint8_t> frame = {0x02, 0x00, 0x22, 0x00, 0x1F, 0x01, 0x00, 0x01, 0x0C, 0x51, 0x03, 0x03}; id(${uart_id}).write_array(frame.data(), frame.size());'
    close_action:
      - lambda: 'std::vector<uint8_t> frame = {0x02, 0x00, 0x22, 0x00, 0x1F, 0x01, 0x00, 0x01, 0x0C, 0x51, 0x03, 0x03}; id(${uart_id}).write_array(frame.data(), frame.size());'

  - platform: template
    name: "Zone 5"
